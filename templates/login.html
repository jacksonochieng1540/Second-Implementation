{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureTrack | Vehicle Security Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #F8FAFC;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Main Container */
        .login-container {
            width: 100%;
            max-width: 450px;
        }

        /* Login Card */
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            border: 1px solid #E2E8F0;
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: #1E293B;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .logo-icon i {
            font-size: 32px;
            color: #3B82F6;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: #1E293B;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 14px;
            color: #64748B;
            margin-top: 8px;
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            font-size: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            font-size: 14px;
            color: #1E293B;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3B82F6;
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .input-group input::placeholder {
            color: #94A3B8;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #3B82F6;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #2563EB;
            transform: translateY(-1px);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #94A3B8;
            font-size: 12px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #E2E8F0;
        }

        .divider-text {
            padding: 0 15px;
        }

        /* Register Link */
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #64748B;
        }

        .register-link a {
            color: #3B82F6;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* Error Message */
        .error-message {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            color: #DC2626;
            font-size: 13px;
            text-align: center;
        }

        /* Security Badges */
        .security-badges {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #E2E8F0;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #64748B;
        }

        .badge i {
            font-size: 10px;
            color: #10B981;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div class="logo-text">SECURETRACK</div>
                <div class="tagline">Vehicle Security System</div>
            </div>

            {% if form.errors %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i> Invalid credentials. Please try again.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">New User?</span>
                <div class="divider-line"></div>
            </div>

            <div class="register-link">
                <a href="/register/">Create an account</a>
            </div>

            <div class="security-badges">
                <div class="badge">
                    <i class="fas fa-check-circle"></i> Secure Connection
                </div>
                <div class="badge">
                    <i class="fas fa-check-circle"></i> 256-bit Encrypted
                </div>
            </div>
        </div>
    </div>
</body>
</html>
